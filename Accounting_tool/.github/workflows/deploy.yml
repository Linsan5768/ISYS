name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          
      - name: Install dependencies
        run: |
          cd web_frontend
          npm ci
          
      - name: Build
        run: |
          cd web_frontend
          npm run build
          
      - name: Create .nojekyll file
        run: |
          touch web_frontend/dist/.nojekyll
          
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: web_frontend/dist
          branch: gh-pages
          clean: true # Automatically remove deleted files
          single-commit: true # Only keep the latest commit on the gh-pages branch 